<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&family=Original+Surfer&display=swap" rel="stylesheet">

</head>
<body>
    <!-- Top Icons -->
    <div class="top-icons">
        <span class="Icon" title="Account">👤</span>
        <span class="Icon" title="Settings">⚙️</span>
    </div>

    <h1 id="dashboard-title">Today's Goals!</h1>
    <div class="dashboard-container">
        <div class="dashboard-item">
            <h2>Meal Plan</h2>
            <p id="meal-content">Here:</p>
        </div>
        <div class="dashboard-item">
            <h2>Today's Workout!</h2>
            <p id="workout-content">Here:</p>
        </div>
    </div>

    <script src="dashboard.js" type="module"></script>
</body>
</html>
